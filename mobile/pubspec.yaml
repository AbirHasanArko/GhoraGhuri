name: ghoraghuri
description: "GhoraGhuri (ঘোরাঘুরি) — Smart Transit Companion for Bangladesh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # HTTP & networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.0

  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0

  # UI
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#084b4d"
  adaptive_icon_foreground: "assets/images/logo.png"
