version: "3.9"

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ghoraghuri-db
    environment:
      POSTGRES_DB: ghoraghuri
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ghoraghuri-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghoraghuri-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ghoraghuri
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Node.js Realtime Server ───────────────────────────
  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: ghoraghuri-realtime
    environment:
      REDIS_URL: redis://redis:6379/0
      PORT: "3001"
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./realtime:/app
      - /app/node_modules
    command: npx tsx watch src/index.ts

  # ── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ghoraghuri-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - realtime

volumes:
  postgres_data:
  redis_data:
